version: '3'
services:
    postgres:
        container_name: ${CONTAINER_NAME}
        build:
            context: ./postgresql
            dockerfile: Dockerfile
        ports:
            - "${POSTGRES_PORT}:5432"
        volumes:
            - ./data/db:/var/lib/postgresql/data
        environment:
            - POSTGRES_DB=${POSTGRES_DB}
            - POSTGRES_USER=${POSTGRES_USER}
            - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
        networks:
            - backend

    redis:
        container_name: shop_redis
        image: redis:7-alpine
        ports:
            - "6379:6379"
        networks:
            - backend

    # приложение живёт на NullPool (свежее соединение на сессию) — PgBouncer
    # амортизирует цену connect. Session-режим + DISCARD ALL (дефолт образа)
    # безопасен для prepared statements asyncpg; transaction-режим НЕ включать
    # без statement_cache_size=0 на стороне приложения.
    # Подключение через пулер: DATABASE_URI=postgresql+asyncpg://...@localhost:6432/...
    pgbouncer:
        container_name: shop_pgbouncer
        image: edoburu/pgbouncer:latest
        environment:
            - DB_HOST=postgres
            - DB_USER=${POSTGRES_USER}
            - DB_PASSWORD=${POSTGRES_PASSWORD}
            - AUTH_TYPE=scram-sha-256
            - POOL_MODE=session
            - MAX_CLIENT_CONN=500
            - DEFAULT_POOL_SIZE=20
        ports:
            - "6432:5432"
        depends_on:
            - postgres
        networks:
            - backend

networks:
    backend:
        name: ${CONTAINER_NETWORK}
        driver: bridge
