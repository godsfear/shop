# Один origin: nginx раздаёт собранный SPA и проксирует /api на бэкенд —
# CORS не нужен, псевдоним и токен не покидают этот origin.
server {
    listen 80;
    server_name _;

    # загрузка документов/анализов (совпадает с ожиданиями фронта)
    client_max_body_size 60m;

    root /usr/share/nginx/html;
    index index.html;

    # клиентские маршруты react-router (/episode/:id, /profile, ...) -> index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # API -> бэкенд по имени сервиса в compose-сети.
    # resolver + переменная upstream: nginx перерезолвит api при пересоздании
    # контейнера (иначе кэширует старый IP -> 502 после `up --build`).
    location /api/ {
        resolver 127.0.0.11 valid=10s;       # встроенный DNS Docker
        set $upstream http://api:8000;
        proxy_pass $upstream;                # переменная -> резолв на каждый запрос
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;              # ИИ-разбор/оценка идут в фоне, но с запасом
    }

    # долгий кэш хешированных ассетов Vite; index.html не кэшируем
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
