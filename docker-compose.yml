# Весь проект одной командой:  docker compose up --build
#
# Открыть:  http://localhost:8080        — приложение (Caddy раздаёт SPA + /api)
#           http://localhost:8025        — Mailpit: письма с кодами подтверждения
#
# Секреты берутся из .env (JWT_SECRET обязателен); остальное имеет dev-дефолты —
# ПЕРЕД ПРОДОМ задать KEK, POSTGRES_PASSWORD, APP_DB_PASSWORD, RESEARCH_PASSWORD.
# Почта: Mailpit ловит письма локально. Для реальной доставки замените на релей
# (SES/SendGrid/собственный SMTP) — SMTP_HOST/PORT/USER/PASSWORD у api и worker.
services:
  postgres:
    image: postgis/postgis:16-3.4
    environment:
      POSTGRES_USER: shop
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-secret}
      POSTGRES_DB: shop
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "shop"]
      interval: 5s
      timeout: 5s
      retries: 12
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    restart: unless-stopped

  mailpit:                          # SMTP-ловушка: письма видны на http://localhost:8025
    image: axllent/mailpit:latest
    ports:
      - "8025:8025"
    restart: unless-stopped

  rabbitmq:                         # шина событий; UI управления на http://localhost:15672 (guest/guest)
    image: rabbitmq:4-management-alpine
    ports:
      - "15672:15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 12
    restart: unless-stopped

  # одноразовый init: миграции (владельцем shop) + роли/RLS + медицинский сид
  migrate:
    build: .
    command: ["python", "-m", "shop.init_stack"]
    environment:
      DATABASE_URI: postgresql+asyncpg://shop:${POSTGRES_PASSWORD:-secret}@postgres:5432/shop
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET требуется — задайте в .env}
      KEK: ${KEK:-dev-kek}
      APP_DB_PASSWORD: ${APP_DB_PASSWORD:-app}
      RESEARCH_PASSWORD: ${RESEARCH_PASSWORD:-research}
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

  api:                              # веб-процесс FastAPI (воркеры — отдельный сервис)
    build: .
    environment:
      DATABASE_URI: postgresql+asyncpg://app:${APP_DB_PASSWORD:-app}@postgres:5432/shop
      REDIS_URI: redis://redis:6379/0
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET требуется — задайте в .env}
      KEK: ${KEK:-dev-kek}
      GOOGLE_API_KEY: ${GOOGLE_API_KEY:-}
      RUN_WORKERS: "false"
      RESEND_API_KEY: ${RESEND_API_KEY:-}   # задан -> реальная отправка через Resend
      MAIL_FROM: ${MAIL_FROM:-onboarding@resend.dev}
      SMTP_HOST: mailpit                    # fallback, когда RESEND_API_KEY пуст
      SMTP_PORT: "1025"
      SMTP_STARTTLS: "false"
    depends_on:
      migrate:
        condition: service_completed_successfully
      redis:
        condition: service_started
    restart: unless-stopped

  worker:                           # фоновые циклы: outbox, sweeper, пул псевдонимов
    build: .
    command: ["python", "-m", "shop.worker"]
    environment:
      DATABASE_URI: postgresql+asyncpg://app:${APP_DB_PASSWORD:-app}@postgres:5432/shop
      REDIS_URI: redis://redis:6379/0
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET требуется — задайте в .env}
      KEK: ${KEK:-dev-kek}
      GOOGLE_API_KEY: ${GOOGLE_API_KEY:-}
      RESEND_API_KEY: ${RESEND_API_KEY:-}   # задан -> реальная отправка через Resend
      MAIL_FROM: ${MAIL_FROM:-onboarding@resend.dev}
      SMTP_HOST: mailpit                    # fallback, когда RESEND_API_KEY пуст
      SMTP_PORT: "1025"
      SMTP_STARTTLS: "false"
      EVENT_BUS: "true"                     # relay + консумеры RabbitMQ
      RABBITMQ_URI: amqp://guest:guest@rabbitmq:5672/
    depends_on:
      migrate:
        condition: service_completed_successfully
      redis:
        condition: service_started
      rabbitmq:
        condition: service_healthy
    restart: unless-stopped

  web:                              # Caddy: SPA + reverse-proxy /api -> api:8000
    build: ./web
    # локально Caddyfile (:80, без TLS). Прод: CADDYFILE=Caddyfile.prod +
    # CF_API_TOKEN + проброс 80/443 ниже + Cloudflare SSL/TLS = Full (strict).
    command: caddy run --config /etc/caddy/${CADDYFILE:-Caddyfile} --adapter caddyfile
    environment:
      CF_API_TOKEN: ${CF_API_TOKEN:-}           # прод: токен Cloudflare zone:DNS:edit
      ACME_EMAIL: ${ACME_EMAIL:-admin@medcard.cc}
      SITE_ADDRESS: ${SITE_ADDRESS:-medcard.cc}
    ports:
      - "8080:80"
      # - "80:80"                   # прод: раскомментировать для ACME-редиректа
      # - "443:443"                 # прод: HTTPS
    volumes:
      - caddy_data:/data            # сертификаты и ACME-аккаунт (переживают рестарт)
    depends_on:
      - api
    restart: unless-stopped

volumes:
  pgdata:
  caddy_data:
