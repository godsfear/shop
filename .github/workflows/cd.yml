name: CD

# Прод-выкат по тегу версии (v1.2.3) + ручной запуск с указанием версии
# (он же откат: укажите прошлый тег). Тесты не дублируем: job ci-green
# ТРЕБУЕТ зелёный прогон CI на выкатываемом коммите (ждёт, если CI ещё идёт)
# — красный или непроверенный код на прод не уедет.
on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      ref:
        description: 'Тег/коммит для выката (откат: прошлый тег, напр. v0.1.0)'
        required: true
      force:
        description: 'Пропустить ворота ci-green (ЭКСТРЕННЫЙ откат на версию без зелёного CI)'
        type: boolean
        default: false

# два деплоя разом не пересекаются; текущий не прерываем на полпути
concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  # ворота: на выкатываемом коммите обязан быть зелёный CI. Тег обычно пушится
  # сразу за коммитом — CI ещё идёт, поэтому ждём (до ~10 минут), а не только
  # проверяем. Нет прогона вовсе — тоже отказ (непроверенный код).
  ci-green:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.ref || github.ref_name }}
      - name: Require green CI for this commit
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # экстренный люк: откат на версию, у которой нет зелёного CI
          # (старые теги до введения ворот) — только руками и осознанно
          if [ "${{ github.event.inputs.force }}" = "true" ]; then
            echo "::warning::ворота ci-green пропущены вручную (force) — выкат без проверки CI"
            exit 0
          fi
          sha=$(git rev-parse HEAD)
          echo "коммит: $sha"
          for i in $(seq 1 30); do
            read -r status conclusion <<< "$(gh api \
              "repos/${{ github.repository }}/actions/workflows/ci.yml/runs?head_sha=$sha&per_page=1" \
              --jq '(.workflow_runs[0].status // "none") + " " + (.workflow_runs[0].conclusion // "-")')"
            echo "CI: status=$status conclusion=$conclusion"
            case "$status/$conclusion" in
              completed/success) echo "CI зелёный — едем"; exit 0;;
              completed/*) echo "::error::CI на $sha завершился «$conclusion» — выкат запрещён"; exit 1;;
              none/*) echo "::error::CI для $sha не запускался — непроверенный код не выкатываем"; exit 1;;
              *) echo "CI ещё идёт — ждём ($i/30)"; sleep 20;;
            esac
          done
          echo "::error::CI не завершился за 10 минут — перезапустите выкат позже"
          exit 1

  deploy:
    needs: ci-green
    runs-on: ubuntu-latest
    environment: production        # Settings → Environments → production: можно
                                   # повесить required reviewers = ручное подтверждение
    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1
        env:
          DEPLOY_REF: ${{ github.event.inputs.ref || github.ref_name }}
        with:
          # host/user — не секреты по сути (IP виден в DNS), поэтому берём из
          # Variables; фолбэк на Secrets — если положите их туда
          host: ${{ vars.SSH_HOST || secrets.SSH_HOST }}
          username: ${{ vars.SSH_USER || secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script_stop: true        # прерваться на первой ошибке шага
          envs: DEPLOY_REF
          script: |
            set -e
            cd /opt/apps/shop

            echo "== получаем версию ${DEPLOY_REF} =="
            git fetch --all --tags --prune
            git checkout --force "${DEPLOY_REF}"

            # бэкап ДО миграций (их прогоняет `up`), тем же скриптом, что и cron.
            # checkout раньше бэкапа — чтобы взять скрипт выкатываемой версии.
            echo "== бэкап БД перед миграциями =="
            bash ops/backup.sh "pre-${DEPLOY_REF}"

            echo "== сборка и запуск =="
            # build не роняет прод: старые контейнеры живут, пока не соберётся новое
            docker compose up -d --build

            echo "== health-check (до минуты) =="
            ok=0
            for i in $(seq 1 12); do
              if curl -fsS -o /dev/null https://medcard.cc; then ok=1; break; fi
              echo "ещё не готово ($i)…"; sleep 5
            done
            [ "$ok" = 1 ] || { echo "HEALTH-CHECK НЕ ПРОШЁЛ — проверьте logs/откат"; exit 1; }

            docker compose ps
            docker image prune -f
            echo "== выкат ${DEPLOY_REF} завершён =="
