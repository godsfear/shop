name: CD

# Прод-выкат по тегу версии (v1.2.3) + ручной запуск с указанием версии
# (он же откат: укажите прошлый тег). CI (ci.yml) уже прогнал тесты на коммитах
# main — тег ставится на зелёный коммит, поэтому тут тесты не дублируем.
on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      ref:
        description: 'Тег/коммит для выката (откат: прошлый тег, напр. v0.1.0)'
        required: true

# два деплоя разом не пересекаются; текущий не прерываем на полпути
concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production        # Settings → Environments → production: можно
                                   # повесить required reviewers = ручное подтверждение
    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1
        env:
          DEPLOY_REF: ${{ github.event.inputs.ref || github.ref_name }}
        with:
          # host/user — не секреты по сути (IP виден в DNS), поэтому берём из
          # Variables; фолбэк на Secrets — если положите их туда
          host: ${{ vars.SSH_HOST || secrets.SSH_HOST }}
          username: ${{ vars.SSH_USER || secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script_stop: true        # прерваться на первой ошибке шага
          envs: DEPLOY_REF
          script: |
            set -e
            cd /opt/apps/shop

            echo "== получаем версию ${DEPLOY_REF} =="
            git fetch --all --tags --prune
            git checkout --force "${DEPLOY_REF}"

            # бэкап ДО миграций (их прогоняет `up`), тем же скриптом, что и cron.
            # checkout раньше бэкапа — чтобы взять скрипт выкатываемой версии.
            echo "== бэкап БД перед миграциями =="
            bash ops/backup.sh "pre-${DEPLOY_REF}"

            echo "== сборка и запуск =="
            # build не роняет прод: старые контейнеры живут, пока не соберётся новое
            docker compose up -d --build

            echo "== health-check (до минуты) =="
            ok=0
            for i in $(seq 1 12); do
              if curl -fsS -o /dev/null https://medcard.cc; then ok=1; break; fi
              echo "ещё не готово ($i)…"; sleep 5
            done
            [ "$ok" = 1 ] || { echo "HEALTH-CHECK НЕ ПРОШЁЛ — проверьте logs/откат"; exit 1; }

            docker compose ps
            docker image prune -f
            echo "== выкат ${DEPLOY_REF} завершён =="
